name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Docker Compose files
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.yml -f docker-compose.build.yml config >/dev/null

  container-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t restauranteer-smoke .

      - name: Run Docker container
        run: |
          mkdir -p "${RUNNER_TEMP}/restauranteer-vault"
          docker run -d --rm \
            --name restauranteer-smoke \
            -p 127.0.0.1:3000:3000 \
            -v "${RUNNER_TEMP}/restauranteer-vault:/data" \
            restauranteer-smoke

      - name: Wait for healthcheck
        run: |
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/health; then
              echo "Container is healthy"
              exit 0
            fi
            echo "Waiting for container health (${attempt}/40)..."
            docker logs --tail=80 restauranteer-smoke || true
            sleep 3
          done
          docker logs restauranteer-smoke || true
          exit 1

      - name: Stop Docker container
        if: always()
        run: docker stop restauranteer-smoke || true

  build-and-push:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: container-smoke
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image digest
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Export image digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build-and-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        id: manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          shopt -s nullglob
          digest_files=(*)
          if [ "${#digest_files[@]}" -eq 0 ]; then
            echo "No image digest artifacts were downloaded" >&2
            exit 1
          fi

          DIGEST_ARGS=()
          for digest_file in "${digest_files[@]}"; do
            DIGEST_ARGS+=("${{ steps.image.outputs.image }}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_ARGS[@]}"

          image_ref="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)"
          manifest_digest=""
          for attempt in 1 2 3 4 5; do
            if inspect_output="$(docker buildx imagetools inspect "$image_ref" 2>&1)"; then
              manifest_digest="$(printf '%s\n' "$inspect_output" | awk '/^Digest:/ { print $2; exit }')"
              [ -n "$manifest_digest" ] && break
            else
              echo "Attempt ${attempt}: inspect failed, retrying..." >&2
              echo "${inspect_output}" >&2
            fi
            sleep 4
          done
          if [ -z "$manifest_digest" ]; then
            echo "Failed to resolve manifest digest for $image_ref" >&2
            exit 1
          fi
          echo "image-ref=$image_ref" >> "$GITHUB_OUTPUT"
          echo "digest=$manifest_digest" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
