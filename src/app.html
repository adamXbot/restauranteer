<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32x32.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="%sveltekit.assets%/favicon-16x16.png" sizes="16x16" type="image/png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<script>
			try {
				const raw = localStorage.getItem('restauranteer.theme');
				if (raw) {
					const theme = JSON.parse(raw);
					const root = document.documentElement;
					if (theme.theme) root.dataset.theme = theme.theme;
					if (theme.mode) root.dataset.themeMode = theme.mode;
					if (theme.brightness) {
						root.dataset.brightness = theme.brightness;
						root.style.colorScheme = theme.brightness;
					}
					if (theme.variables) {
						for (const key of Object.keys(theme.variables)) {
							root.style.setProperty(key, theme.variables[key]);
						}
					}
				}
			} catch {}
		</script>

		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Restauranteer" />

		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />

		<!-- iOS splash screens — matched per device by media query -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/iphone-se-3-2x.png"
			media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/iphone-13-mini-3x.png"
			media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/iphone-14-3x.png"
			media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/iphone-14-pro-3x.png"
			media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/iphone-14-plus-3x.png"
			media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/iphone-14-pro-max-3x.png"
			media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/ipad-pro-11-2x.png"
			media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
